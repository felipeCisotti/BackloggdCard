<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backloggd Card</title>

  <style>
    :root {
      --bg-body: #13141c;
      --bg-card: #1e202d;
      --text-primary: #ffffff;
      --text-secondary: #a0a4b8;
      --input-bg: #151721;
      --input-border: #2d3142;
      --primary-color: #f84b6b;
      --primary-hover: #ff6380;
      --focus-ring: rgba(248, 75, 107, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    /* Container principal do formulário */
    .card-container {
      background-color: #13141c;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .header {
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
    }

    /* Estilização dos grupos de formulário */
    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Inputs de texto e select */
    input[type="text"],
    select {
      width: 100%;
      padding: 12px 16px;
      background-color: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    input[type="text"]::placeholder {
      color: #5a5f73;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    /* Estilização customizada para Inputs de Arquivo */
    .file-upload-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      background-color: var(--input-bg);
      border: 1px dashed var(--input-border);
      padding: 8px;
      border-radius: 8px;
      transition: border-color 0.2s ease;
    }

    .file-upload-wrapper:hover {
      border-color: var(--primary-color);
    }

    .file-upload-wrapper input[type="file"] {
      display: none;
      /* Esconde o input feio padrão */
    }

    .file-btn {
      background-color: #2a2e40;
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .file-btn:hover {
      background-color: #363b52;
    }

    .file-name {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    /* Botões de Ação */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: white;
      box-shadow: 0 4px 12px rgba(248, 75, 107, 0.2);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--primary-color);
      border: 1px solid var(--primary-color);
    }

    .btn-secondary:hover {
      background-color: rgba(248, 75, 107, 0.1);
    }

    canvas {
      height: 100vh;
      padding: 20px;
      margin-left: 20px;
      border-radius: 20px;
      background-color: var(--input-bg);
    }
  </style>
</head>

<body>


  <div class="card-container">
    <div class="header">
      <h1>Backloggd Card</h1>
      <p>Adicione as informações do seu jogo para exportar o card.</p>
    </div>

    <div class="form-group">
      <label for="Titulo">Titulo do jogo</label>
      <input type="text" id="title" placeholder="Insira o nome do jogo" oninput="render()">
    </div>

    <div class="form-group">
      <label for="estrelas">Estrelas</label>
      <select id="stars" onchange="render()">
        <option value="5">★★★★★</option>
        <option value="4">★★★★☆</option>
        <option value="3">★★★☆☆</option>
        <option value="2">★★☆☆☆</option>
        <option value="1">★☆☆☆☆</option>
        <option value="0">☆☆☆☆☆</option>
      </select>
    </div>

    <div class="form-group">
      <label>Fundo</label>
      <div class="file-upload-wrapper">
        <label for="bgFile" class="file-btn">Escolher arquivo</label>
        <span class="file-name" id="file-fundo">Nenhum arquivo selecionado</span>
        <input type="file" id="bgFile" class="custom-file-input" accept="image/*">
      </div>
    </div>

    <div class="form-group">
      <label>Capa do jogo</label>
      <div class="file-upload-wrapper">
        <label for="gameFile" class="file-btn">Escolher arquivo</label>
        <span class="file-name" id="file-capa">Nenhum arquivo selecionado</span>
        <input type="file" id="gameFile" class="custom-file-input" accept="image/*">
      </div>
    </div>

    <div class="form-group">
      <label>Avatar</label>
      <div class="file-upload-wrapper">
        <label for="avatarFile" class="file-btn">Escolher arquivo</label>
        <span class="file-name" id="file-avatar">Nenhum arquivo selecionado</span>
        <input type="file" id="avatarFile" class="custom-file-input" accept="image/*">
      </div>
    </div>

    <div class="actions">
      <button onclick="searchGame()" class="btn btn-secondary">Buscar imagens (RAWG)</button>
      <button onclick="gerarCard()" class="btn btn-primary" id="btn-gerar">Gerar Card</button>
      <button onclick="download()" class="btn btn-primary" id="btn-exportar" style="display: none;">Exportar</button>
    </div>

  </div>

  <canvas id="canvas" width="720" height="1280" style="border-radius: 20px; display: none;"></canvas>



  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const RAWG_KEY = 'SUAAPIKEYAQUI';
    const HANDLE = 12;

    let active = null;
    let action = null;
    let last = { x: 0, y: 0 };
    let startDist = 0;

    function layer(type) {
      return {
        type,
        img: null,
        x: 100, y: 100, w: 500, h: 500,
        r: 0,
        selected: false
      }
    }

    const layers = {
      bg: layer('bg'),
      game: layer('game'),
      avatar: layer('avatar')
    };

    // fundo começa maior que o canvas (pra enquadrar)
    layers.bg.x = -200;
    layers.bg.y = -200;
    layers.bg.w = 1100;
    layers.bg.h = 1700;

    // avatar padrão
    layers.avatar.x = 312;
    layers.avatar.y = 92;
    layers.avatar.w = 96;
    layers.avatar.h = 96;

    function loadFile(file, target) {
      const img = new Image();
      img.onload = () => {
        target.img = img;
        if (target.type === 'bg') {
          const scale = Math.max(720 / img.width, 1280 / img.height);
          target.w = img.width * scale;
          target.h = img.height * scale;
          target.x = (720 - target.w) / 2;
          target.y = (1280 - target.h) / 2;
        }
        render();
      };
      img.src = URL.createObjectURL(file);
    }

    document.getElementById('bgFile').onchange = e => {
      document.getElementById('file-fundo').innerText = e.target.files[0]?.name || 'Nenhum arquivo selecionado';
      loadFile(e.target.files[0], layers.bg);
    }
    document.getElementById('gameFile').onchange = e => {
      document.getElementById('file-capa').innerText = e.target.files[0]?.name || 'Nenhum arquivo selecionado';
      loadFile(e.target.files[0], layers.game);
    }
    document.getElementById('avatarFile').onchange = e => {
      document.getElementById('file-avatar').innerText = e.target.files[0]?.name || 'Nenhum arquivo selecionado';
      loadFile(e.target.files[0], layers.avatar);
    }

    async function searchGame() {
      const q = document.getElementById('title').value;
      if (!q) return;

      const res = await fetch(`https://api.rawg.io/api/games?key=${RAWG_KEY}&search=${encodeURIComponent(q)}`);
      const data = await res.json();
      if (!data.results.length) return;

      const g = data.results[0];

      layers.bg.img = await loadURL(g.background_image);
      layers.game.img = await loadURL(g.short_screenshots?.[0]?.image || g.background_image);

      gerarCard();
    }

    function loadURL(url) {
      return new Promise(res => {
        const i = new Image();
        i.crossOrigin = "anonymous";
        i.onload = () => res(i);
        i.src = url;
      });
    }

    function drawLayer(l) {
      if (!l.img) return;

      ctx.save();
      ctx.translate(l.x + l.w / 2, l.y + l.h / 2);
      ctx.rotate(l.r);

      if (l.type === 'avatar') {
        ctx.beginPath();
        ctx.arc(0, 0, l.w / 2, 0, Math.PI * 2);
        ctx.clip();
      }

      ctx.drawImage(l.img, -l.w / 2, -l.h / 2, l.w, l.h);

      if (l.type === 'avatar') {
        ctx.beginPath();
        ctx.arc(0, 0, l.w / 2, 0, Math.PI * 2);
        ctx.lineWidth = 12; // Compensar o clip
        ctx.strokeStyle = '#f84b6b';
        ctx.stroke();
      }

      ctx.restore();

      if (l.selected) {
        ctx.strokeStyle = '#ff4d6d';
        ctx.lineWidth = 2;
        ctx.strokeRect(l.x, l.y, l.w, l.h);
        ctx.fillStyle = '#ff4d6d';
        ctx.fillRect(l.x + l.w - HANDLE / 2, l.y + l.h - HANDLE / 2, HANDLE, HANDLE);
      }
    }

    function render() {
      ctx.clearRect(0, 0, 720, 1280);
      ctx.fillStyle = '#13141c';
      ctx.fillRect(0, 0, 720, 1280);

      drawLayer(layers.bg);
      drawLayer(layers.game);

      // Gradiente suave no fundo para leitura do texto
      const grad = ctx.createLinearGradient(0, 600, 0, 1280);
      grad.addColorStop(0, 'rgba(19, 20, 28, 0)');
      grad.addColorStop(0.5, 'rgba(19, 20, 28, 0.8)');
      grad.addColorStop(1, 'rgba(19, 20, 28, 1)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 720, 1280);

      drawLayer(layers.avatar);

      const title = document.getElementById('title').value || 'Nome do Jogo';
      const stars = +document.getElementById('stars').value;

      ctx.textAlign = 'center';

      // Título
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 50px "Inter", sans-serif';
      ctx.fillText(title, 360, 1030);

      // Estrelas
      ctx.fillStyle = '#f84b6b';
      ctx.font = '45px Arial';
      const starText = '★'.repeat(stars) + '☆'.repeat(5 - stars);
      ctx.fillText(starText, 360, 1090);

      // Texto Backloggd
      ctx.fillStyle = '#a0a4b8';
      ctx.font = '500 24px "Inter", sans-serif';
      ctx.fillText('LOGGED ON', 360, 1150);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 36px "Inter", sans-serif';
      ctx.fillText('BACKLOGGD', 360, 1195);
    }

    function hit(l, x, y) {
      return x > l.x && x < l.x + l.w && y > l.y && y < l.y + l.h;
    }

    canvas.onmousedown = e => {
      const x = e.offsetX, y = e.offsetY;
      active = null;
      Object.values(layers).reverse().forEach(l => {
        l.selected = false;
        if (hit(l, x, y) && !active) { active = l; }
      });

      if (active) {
        active.selected = true;
        action =
          (x > active.x + active.w - HANDLE && y > active.y + active.h - HANDLE)
            ? 'resize'
            : e.altKey ? 'rotate' : 'move';
      }

      last = { x, y };
      render();
    };

    canvas.onmousemove = e => {
      if (!active || !action) return;

      const dx = e.offsetX - last.x;
      const dy = e.offsetY - last.y;

      if (action === 'move') { active.x += dx; active.y += dy; }

      if (action === 'resize') {
        if (e.shiftKey) {
          const r = active.w / active.h;
          active.w += dx;
          active.h = active.w / r;
        } else {
          active.w += dx;
          active.h += dy;
        }
      }

      if (action === 'rotate') { active.r += dx * 0.01; }

      last = { x: e.offsetX, y: e.offsetY };
      render();
    };

    canvas.onmouseup = () => action = null;
    canvas.onmouseleave = () => action = null;

    /* TOUCH PINCH */
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        startDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && active) {
        const d = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const s = d / startDist;
        active.w *= s;
        active.h *= s;
        startDist = d;
        render();
      }
    }, { passive: false });

    function download() {
      const a = document.createElement('a');
      a.download = 'backlog-card.png';
      a.href = canvas.toDataURL();
      a.click();
    }

    function gerarCard() {
      render();
      canvas.style.display = 'block';
      document.getElementById('btn-exportar').style.display = 'block';
      document.getElementById('btn-gerar').innerText = 'Atualizar Card';

      // Centraliza no layout e rola para o canvas se estiver em tela menor
      if (window.innerWidth < 1200) {
        canvas.scrollIntoView({ behavior: 'smooth' });
      }
    }

    render();
  </script>

</body>

</html>
